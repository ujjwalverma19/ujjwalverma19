<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="2.4s" repeatCount="indefinite" />

    <!-- body -->
    <circle cx="70" cy="78" r="42" fill="#2a2640" stroke="#6c5ce7" stroke-width="3"/>

    <!-- antenna -->
    <line x1="70" y1="36" x2="70" y2="18" stroke="#6c5ce7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="70" cy="14" r="5" fill="#a29bfe">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- eyes -->
    <circle cx="56" cy="74" r="5.5" fill="#a29bfe"/>
    <circle cx="84" cy="74" r="5.5" fill="#a29bfe"/>

    <!-- smile -->
    <path d="M56 92 Q70 102 84 92" stroke="#a29bfe" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- left arm (static) -->
    <path d="M32 82 Q18 88 20 102" stroke="#6c5ce7" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- right arm (waving) -->
    <g transform="translate(108,80)">
      <path d="M0 0 Q16 -6 18 -22" stroke="#6c5ce7" stroke-width="4" fill="none" stroke-linecap="round" transform-origin="0 0">
        <animateTransform attributeName="transform" type="rotate" values="0;25;0;25;0" keyTimes="0;0.25;0.5;0.75;1" dur="1.6s" repeatCount="indefinite" additive="sum"/>
      </path>
    </g>
  </g>
</svg>
